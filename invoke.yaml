# invoke.yaml

# Code folder
code_dir: analysis

# Notebooks folder
notebooks_dir: notebooks

# Data folders
source_data_dir: source_data
output_data_dir: output_data

# CNeuroMod datasets — each has its own BIDS Stats Models descriptor and subject list.
# Run a single dataset:  invoke run-glm --dataset langlocalizer
# Run all datasets:      invoke run
datasets:
  langlocalizer:
    model: models/langlocalizer.json
    subjects: sub-01,sub-02,sub-03,sub-05
  hcptrt:
    model: models/hcptrt.json
    subjects: sub-01,sub-02,sub-03,sub-04,sub-05,sub-06
  naturalistic:
    model: models/naturalistic.json
    subjects: sub-01,sub-02,sub-03,sub-04,sub-05,sub-06


# SSH URL for the ria-sequoia RIA store (set to "" to skip SSH reconfiguration)
ria_sequoia_ssh_url: ria+ssh://elm/data/neuromod/ria-sequoia

# GLM parameters (shared across datasets; override per-dataset in the model JSON if needed)
tr: 1.49
smoothing_fwhm: 5.0
n_compcor: 6

# fROI parameters
froi_top_percent: 0.10

# File sources
files:
  fedorenko_atlas_nii:
    url: https://www.evlab.mit.edu/s/allParcels-language-SN220-hgwm.nii
    output_file: source_data/fedorenko/allParcels-language-SN220.nii
  fedorenko_atlas_txt:
    url: https://evlab.squarespace.com/s/allParcels-language-SN220.txt
    output_file: source_data/fedorenko/allParcels-language-SN220.txt
  
  md_atlas_nii:
    url: https://evlab.squarespace.com/s/allParcels-MD-HE197.nii
    output_file: source_data/fedorenko/allParcels-MD-HE197.nii
    
  md_atlas_txt:
    url: https://evlab.squarespace.com/s/allParcels-MD-HE197.txt
    output_file: source_data/fedorenko/allParcels-MD-HE197.txt

figures_output_dir: output_data/figures_manuscript
naturalistic_data_dir: ""
